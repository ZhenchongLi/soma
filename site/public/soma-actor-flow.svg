<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
    <marker id="purple-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8250df"/>
    </marker>
    <style>
      .ui { font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-size: 12px; fill: #57606a; }
      .box-title { font-size: 13px; font-weight: 700; fill: #1f2328; }
      .box-sub { font-size: 11px; fill: #57606a; }
      .tiny { font-size: 10px; fill: #57606a; }
      .edge { stroke: #8c959f; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #8c959f; stroke-width: 1.3; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .edge-purple { stroke: #8250df; stroke-width: 1.7; fill: none; marker-end: url(#purple-arrow); }
    </style>
  </defs>

  <rect x="2" y="2" width="1176" height="716" rx="14" fill="#ffffff" stroke="#d0d7de"/>

  <text x="32" y="40" class="title">soma_actor agent workflow</text>
  <text x="32" y="62" class="subtitle ui">messages enter an actor; LLM calls only produce proposals; policy and budget decide what can execute</text>

  <!-- input lane -->
  <rect x="34" y="118" width="208" height="170" rx="10" fill="#eef6ff" stroke="#0969da"/>
  <text x="58" y="150" class="box-title">public edge</text>
  <text x="58" y="176" class="box-sub ui">bin/soma</text>
  <text x="58" y="197" class="box-sub ui">Lisp run / ask forms</text>
  <text x="58" y="218" class="box-sub ui">local Unix socket</text>
  <text x="58" y="246" class="tiny ui">map APIs can embed the same path</text>

  <!-- actor boundary -->
  <rect x="306" y="94" width="500" height="430" rx="16" fill="#fbfaff" stroke="#d8c8ff" stroke-width="1.6"/>
  <text x="334" y="128" class="box-title" fill="#6639ba">soma_actor</text>
  <text x="334" y="150" class="box-sub ui">long-lived gen_statem: task owner, state owner, policy owner</text>

  <rect x="338" y="188" width="176" height="72" rx="8" fill="#eef6ff" stroke="#0969da"/>
  <text x="362" y="218" class="box-title">mailbox</text>
  <text x="362" y="240" class="box-sub ui">message envelope</text>

  <rect x="596" y="188" width="176" height="72" rx="8" fill="#eef6ff" stroke="#0969da"/>
  <text x="620" y="218" class="box-title">task state</text>
  <text x="620" y="240" class="box-sub ui">task / correlation ids</text>

  <rect x="338" y="318" width="176" height="78" rx="8" fill="#fff8c5" stroke="#9a6700"/>
  <text x="362" y="349" class="box-title">decision frame</text>
  <text x="362" y="371" class="box-sub ui">context + events</text>

  <rect x="596" y="318" width="176" height="78" rx="8" fill="#fff8c5" stroke="#9a6700"/>
  <text x="620" y="349" class="box-title">proposal gate</text>
  <text x="620" y="371" class="box-sub ui">normalize + policy + budget</text>

  <rect x="448" y="438" width="212" height="58" rx="8" fill="#faf0ff" stroke="#8250df"/>
  <text x="474" y="463" class="box-title">control stays here</text>
  <text x="474" y="482" class="box-sub ui">no LLM-owned execution loop</text>

  <!-- operation lane -->
  <rect x="878" y="96" width="256" height="86" rx="10" fill="#faf0ff" stroke="#8250df"/>
  <text x="904" y="128" class="box-title">soma_llm_call</text>
  <text x="904" y="152" class="box-sub ui">one model call, then exits</text>
  <text x="904" y="169" class="tiny ui">returns proposal data</text>

  <rect x="878" y="238" width="256" height="92" rx="10" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="904" y="270" class="box-title">soma_run</text>
  <text x="904" y="294" class="box-sub ui">executes validated steps</text>
  <text x="904" y="312" class="tiny ui">spawns one soma_tool_call per step</text>

  <rect x="878" y="386" width="256" height="86" rx="10" fill="#f6f8fa" stroke="#57606a"/>
  <text x="904" y="418" class="box-title">actor message</text>
  <text x="904" y="442" class="box-sub ui">deliver to another soma_actor</text>
  <text x="904" y="459" class="tiny ui">preserves correlation_id</text>

  <rect x="878" y="528" width="256" height="72" rx="10" fill="#eef6ff" stroke="#0969da"/>
  <text x="904" y="558" class="box-title">reply / wait</text>
  <text x="904" y="580" class="box-sub ui">finish now or wait for child result</text>

  <!-- event/result lane -->
  <rect x="306" y="586" width="500" height="84" rx="10" fill="#f6f8fa" stroke="#57606a"/>
  <text x="334" y="618" class="box-title">event stream + result trail</text>
  <text x="334" y="642" class="box-sub ui">task_id / correlation_id links actor, LLM, run, tool calls, replies, and failures</text>

  <rect x="34" y="538" width="208" height="100" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="58" y="570" class="box-title">read side</text>
  <text x="58" y="594" class="box-sub ui">ask reply</text>
  <text x="58" y="615" class="box-sub ui">status / result polling</text>
  <text x="58" y="636" class="box-sub ui">trace by correlation id</text>

  <!-- arrows inside actor -->
  <path class="edge" d="M242,203 H338"/>
  <text x="260" y="193" class="tiny ui">message</text>

  <path class="edge" d="M514,224 H596"/>
  <text x="535" y="214" class="tiny ui">accept</text>

  <path class="edge" d="M684,260 V296 H426 V318"/>
  <text x="524" y="289" class="tiny ui">build context</text>

  <path class="edge" d="M514,357 H596"/>
  <text x="534" y="347" class="tiny ui">proposal</text>

  <path class="edge-purple" d="M684,396 V432 H554 V438"/>
  <text x="579" y="426" class="tiny ui">approved action</text>

  <!-- actor to operations -->
  <path class="edge-purple" d="M772,336 C828,312 838,148 878,140"/>
  <text x="818" y="170" class="tiny ui">call LLM</text>

  <path class="edge-purple" d="M772,354 C830,354 838,288 878,286"/>
  <text x="820" y="302" class="tiny ui">start run</text>

  <path class="edge-purple" d="M772,372 C830,388 838,430 878,430"/>
  <text x="820" y="418" class="tiny ui">send</text>

  <path class="edge-purple" d="M660,467 C760,492 810,562 878,564"/>
  <text x="760" y="540" class="tiny ui">reply / wait</text>

  <!-- operation results back to actor -->
  <path class="edge-soft" d="M878,138 C826,138 818,202 772,210"/>
  <path class="edge-soft" d="M878,286 C832,286 820,246 772,238"/>
  <path class="edge-soft" d="M878,430 C828,430 818,258 772,250"/>

  <!-- events -->
  <path class="edge-soft" d="M1134,182 H1150 V624 H806"/>
  <path class="edge-soft" d="M1134,330 H1150 V624"/>
  <path class="edge-soft" d="M1134,472 H1150 V624"/>
  <path class="edge-soft" d="M1134,600 H1150 V624"/>

  <path class="edge-soft" d="M556,524 V586"/>
  <path class="edge" d="M306,628 H242"/>

  <text x="32" y="694" class="subtitle ui">LLM output is never execution. It is proposal data that re-enters normalization, policy, budget, and the normal supervised run path.</text>
</svg>
