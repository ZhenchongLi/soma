<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="716" height="426" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <text x="24" y="32" font-size="14" font-weight="700" fill="#1f2328">Run state machine — soma_run (gen_statem)</text>
  <text x="24" y="50" font-size="11" fill="#57606a" font-family="system-ui, -apple-system, Segoe UI, sans-serif">explicit terminal states; the step cursor is the executing &#8644; waiting_tool loop</text>

  <!-- edges -->
  <g stroke="#8c959f" stroke-width="1.4" fill="none">
    <path d="M184,205 H274" marker-end="url(#a2)"/>
    <path d="M322,230 C300,292 152,292 126,232" marker-end="url(#a2)"/>
    <path d="M114,180 V94 H564" marker-end="url(#a2)"/>
    <path d="M432,200 L564,174" marker-end="url(#a2)"/>
    <path d="M432,210 L564,254" marker-end="url(#a2)"/>
    <path d="M432,219 L564,334" marker-end="url(#a2)"/>
  </g>

  <!-- edge labels -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#57606a" font-size="10">
    <text x="229" y="198" text-anchor="middle">start tool call</text>
    <text x="225" y="307" text-anchor="middle">tool ok &#183; next step</text>
    <text x="300" y="86" text-anchor="middle">no steps left</text>
    <text x="498" y="176" text-anchor="middle">error / crash</text>
    <text x="500" y="228" text-anchor="middle">step timeout</text>
    <text x="512" y="300" text-anchor="middle">cancel</text>
  </g>

  <!-- states -->
  <rect x="44" y="180" width="140" height="50" rx="7" fill="#faf0ff" stroke="#8250df"/>
  <text x="114" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">executing</text>

  <rect x="274" y="180" width="158" height="50" rx="7" fill="#faf0ff" stroke="#8250df"/>
  <text x="353" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">waiting_tool</text>

  <rect x="564" y="72" width="130" height="44" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="629" y="99" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">completed</text>

  <rect x="564" y="152" width="130" height="44" rx="7" fill="#ffebe9" stroke="#cf222e"/>
  <text x="629" y="179" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">failed</text>

  <rect x="564" y="232" width="130" height="44" rx="7" fill="#fff1e5" stroke="#bc4c00"/>
  <text x="629" y="259" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">timeout</text>

  <rect x="564" y="312" width="130" height="44" rx="7" fill="#eaeef2" stroke="#57606a"/>
  <text x="629" y="339" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">cancelled</text>

  <text x="24" y="404" font-size="10.5" fill="#57606a" font-family="system-ui, sans-serif">A timeout or cancel kills the active worker (and, for a cli tool, its external OS process) before the run settles.</text>
</svg>
