<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="716" height="406" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <text x="24" y="32" font-size="14" font-weight="700" fill="#1f2328">A tool call crosses a process boundary</text>
  <text x="24" y="50" font-size="11" fill="#57606a" font-family="system-ui, -apple-system, Segoe UI, sans-serif">the run spawns a worker per call; the worker picks the adapter and messages the result back</text>

  <!-- process boundary -->
  <line x1="246" y1="74" x2="246" y2="356" stroke="#8c959f" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="246" y="70" text-anchor="middle" font-size="9.5" fill="#8c959f" font-family="system-ui, sans-serif">process boundary</text>

  <!-- edges -->
  <g stroke="#8c959f" stroke-width="1.4" fill="none">
    <path d="M188,196 H298" marker-end="url(#a3)"/>
    <path d="M478,190 L534,140" marker-end="url(#a3)"/>
    <path d="M478,218 L534,266" marker-end="url(#a3)"/>
    <path d="M300,222 C228,288 182,288 154,236" marker-end="url(#a3)"/>
  </g>

  <!-- edge labels -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" fill="#57606a" font-size="10">
    <text x="243" y="189" text-anchor="middle">spawn + monitor</text>
    <text x="512" y="156" text-anchor="middle">adapter = erlang_module</text>
    <text x="512" y="248" text-anchor="middle">adapter = cli</text>
    <text x="236" y="300" text-anchor="middle">{tool_result, Id, Pid, Result}</text>
  </g>

  <!-- soma_run -->
  <rect x="38" y="176" width="150" height="58" rx="7" fill="#faf0ff" stroke="#8250df"/>
  <text x="113" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">soma_run</text>
  <text x="113" y="216" text-anchor="middle" font-size="10" fill="#57606a" font-family="system-ui, sans-serif">gen_statem · owns run state</text>

  <!-- soma_tool_call -->
  <rect x="298" y="176" width="180" height="58" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="388" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">soma_tool_call</text>
  <text x="388" y="216" text-anchor="middle" font-size="10" fill="#57606a" font-family="system-ui, sans-serif">worker · one call, then exits</text>

  <!-- erlang_module adapter -->
  <rect x="534" y="104" width="168" height="52" rx="7" fill="#ddf4ff" stroke="#0969da"/>
  <text x="618" y="126" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">erlang_module</text>
  <text x="618" y="142" text-anchor="middle" font-size="10" fill="#57606a" font-family="system-ui, sans-serif">Module:invoke/2 · in-BEAM</text>

  <!-- cli adapter -->
  <rect x="534" y="250" width="168" height="52" rx="7" fill="#fff1e5" stroke="#bc4c00" stroke-dasharray="4 3"/>
  <text x="618" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">cli</text>
  <text x="618" y="288" text-anchor="middle" font-size="10" fill="#57606a" font-family="system-ui, sans-serif">open_port → external exe</text>

  <text x="24" y="384" font-size="10.5" fill="#57606a" font-family="system-ui, sans-serif">On timeout / cancel, soma_run kills the worker — and a cli tool's external OS process with it, shell-free (no os:cmd).</text>
</svg>
