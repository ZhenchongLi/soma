<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8250df"/>
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 12px; fill: #57606a; }
      .label { font-size: 13px; font-weight: 700; fill: #1f2328; }
      .small { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 11px; fill: #57606a; }
      .tiny { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 10px; fill: #57606a; }
      .mono { font-size: 11px; fill: #57606a; }
      .edge { stroke: #8c959f; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #8c959f; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
      .edge-purple { stroke: #8250df; stroke-width: 1.6; fill: none; marker-end: url(#arrow-purple); }
      .box { rx: 8; stroke-width: 1.3; }
    </style>
  </defs>

  <rect x="2" y="2" width="1176" height="756" rx="14" fill="#ffffff" stroke="#d0d7de"/>

  <text x="30" y="36" class="title">soma_actor message-driven workflow</text>
  <text x="30" y="57" class="subtitle">The actor owns control. LLM calls propose actions; policy gates execution; events carry the result trail.</text>

  <!-- outer actor boundary -->
  <rect x="258" y="82" width="622" height="506" rx="14" fill="#fbfaff" stroke="#d8c8ff" stroke-width="1.5"/>
  <text x="280" y="110" class="label" fill="#6639ba">soma_actor</text>
  <text x="280" y="129" class="small">long-lived agent entity: mailbox, state, memory refs, model config, policy, active tasks</text>

  <!-- triggers -->
  <rect class="box" x="30" y="100" width="190" height="146" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="50" y="128" class="label">message sources</text>
  <text x="50" y="153" class="mono">user message</text>
  <text x="50" y="174" class="mono">actor message</text>
  <text x="50" y="195" class="mono">timer / webhook</text>
  <text x="50" y="216" class="mono">run result</text>

  <rect class="box" x="292" y="160" width="188" height="78" fill="#eef6ff" stroke="#0969da"/>
  <text x="316" y="190" class="label">mailbox</text>
  <text x="316" y="212" class="small">actor_message envelope</text>

  <rect class="box" x="532" y="160" width="272" height="78" fill="#eef6ff" stroke="#0969da"/>
  <text x="556" y="190" class="label">actor state machine</text>
  <text x="556" y="212" class="small">idle / thinking / running / waiting / paused</text>

  <rect class="box" x="292" y="282" width="188" height="82" fill="#fff8c5" stroke="#9a6700"/>
  <text x="316" y="312" class="label">load context</text>
  <text x="316" y="334" class="small">memory + task state</text>

  <rect class="box" x="532" y="282" width="272" height="82" fill="#fff8c5" stroke="#9a6700"/>
  <text x="556" y="312" class="label">decision frame</text>
  <text x="556" y="334" class="small">state + context + policy + budget + events</text>

  <rect class="box" x="408" y="412" width="280" height="82" fill="#faf0ff" stroke="#8250df"/>
  <text x="432" y="442" class="label">decide next action</text>
  <text x="432" y="464" class="small">rules first; LLM for reasoning when needed</text>

  <rect class="box" x="724" y="412" width="128" height="82" fill="#ffebe9" stroke="#cf222e"/>
  <text x="744" y="442" class="label">policy gate</text>
  <text x="744" y="464" class="small">allow / deny</text>

  <!-- operations -->
  <rect class="box" x="930" y="100" width="200" height="80" fill="#faf0ff" stroke="#8250df"/>
  <text x="954" y="130" class="label">soma_llm_call</text>
  <text x="954" y="152" class="small">proposal: reply, tool call, steps</text>

  <rect class="box" x="930" y="224" width="200" height="92" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="954" y="254" class="label">soma_run</text>
  <text x="954" y="276" class="small">execute validated steps</text>
  <text x="954" y="294" class="tiny">spawns soma_tool_call per step</text>

  <rect class="box" x="930" y="360" width="200" height="80" fill="#f6f8fa" stroke="#57606a"/>
  <text x="954" y="390" class="label">actor message</text>
  <text x="954" y="412" class="small">send to another soma_actor</text>

  <rect class="box" x="930" y="484" width="200" height="80" fill="#eef6ff" stroke="#0969da"/>
  <text x="954" y="514" class="label">reply / wait</text>
  <text x="954" y="536" class="small">return result or wait for events</text>

  <!-- event/result store -->
  <rect class="box" x="258" y="632" width="622" height="82" fill="#f6f8fa" stroke="#57606a"/>
  <text x="280" y="662" class="label">event stream + result trail</text>
  <text x="280" y="684" class="small">task_id / correlation_id links actor, LLM call, run, tool call, reply, and final result</text>

  <!-- outputs -->
  <rect class="box" x="930" y="632" width="200" height="82" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="954" y="662" class="label">result access</text>
  <text x="954" y="684" class="mono">ask/reply</text>
  <text x="1038" y="684" class="mono">events</text>
  <text x="954" y="704" class="mono">poll status/result</text>

  <!-- arrows -->
  <path class="edge" d="M220,173 H292"/>
  <path class="edge" d="M480,199 H532"/>
  <path class="edge" d="M668,238 V258 H386 V282"/>
  <path class="edge" d="M480,323 H532"/>
  <path class="edge" d="M668,364 V392 H548 V412"/>
  <path class="edge" d="M688,453 H724"/>

  <path class="edge-purple" d="M852,430 C890,388 900,164 930,144"/>
  <path class="edge-purple" d="M852,446 C892,430 900,292 930,278"/>
  <path class="edge-purple" d="M852,462 C890,466 902,410 930,404"/>
  <path class="edge-purple" d="M852,478 C894,492 902,522 930,526"/>

  <!-- result feedback into actor state machine -->
  <path class="edge-soft" d="M930,140 C874,140 850,140 805,176"/>
  <path class="edge-soft" d="M930,270 C874,270 842,248 804,220"/>
  <path class="edge-soft" d="M930,400 C874,400 832,258 804,220"/>

  <!-- events -->
  <path class="edge-soft" d="M1030,180 V632"/>
  <path class="edge-soft" d="M1030,316 V632"/>
  <path class="edge-soft" d="M1030,440 V632"/>
  <path class="edge-soft" d="M1030,564 V632"/>
  <path class="edge" d="M880,673 H930"/>

  <!-- bottom loop back -->
  <path class="edge-soft" d="M568,632 C520,586 516,536 532,494"/>

  <!-- annotations -->
  <text x="244" y="164" class="tiny">message</text>
  <text x="486" y="192" class="tiny">enqueue</text>
  <text x="530" y="253" class="tiny">task event</text>
  <text x="490" y="316" class="tiny">context</text>
  <text x="696" y="444" class="tiny">proposal</text>
  <text x="890" y="118" class="tiny">call LLM</text>
  <text x="888" y="254" class="tiny">start run</text>
  <text x="884" y="386" class="tiny">send</text>
  <text x="892" y="516" class="tiny">finish</text>

  <text x="30" y="724" class="subtitle">Control stays in soma_actor: LLM output is a proposal, policy validates it, and every step is tied to the same correlation chain.</text>
</svg>
