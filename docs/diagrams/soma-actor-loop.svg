<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c959f"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8250df"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 750; fill: #1f2328; }
      .subtitle { font-size: 13px; fill: #57606a; }
      .label { font-size: 16px; font-weight: 700; fill: #1f2328; }
      .small { font-size: 12px; fill: #57606a; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #57606a; }
      .edge { stroke: #8c959f; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .edge-purple { stroke: #8250df; stroke-width: 2; fill: none; marker-end: url(#arrow-purple); }
      .edge-dash { stroke: #8c959f; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .box { rx: 10; stroke-width: 1.4; }
    </style>
  </defs>

  <rect x="2" y="2" width="1076" height="616" rx="16" fill="#ffffff" stroke="#d0d7de"/>

  <text x="36" y="44" class="title">soma_actor 工作循环</text>
  <text x="36" y="68" class="subtitle">需求通过 message 进入 actor；rules/LLM 产生 proposal；actor 校验并执行；结果再以 message/event 回到 actor，直到最终 result。</text>

  <!-- main loop background -->
  <rect x="250" y="104" width="570" height="364" rx="18" fill="#fbfaff" stroke="#d8c8ff" stroke-width="1.6"/>
  <text x="276" y="134" class="label" fill="#6639ba">soma_actor loop</text>
  <text x="276" y="155" class="small">控制权在 actor：state + memory/context + policy + active task</text>

  <!-- input -->
  <rect class="box" x="36" y="220" width="160" height="94" fill="#eef6ff" stroke="#0969da"/>
  <text x="74" y="252" class="label">你的需求</text>
  <text x="64" y="276" class="small">user need</text>
  <text x="64" y="294" class="mono">actor_message</text>

  <!-- actor receive -->
  <rect class="box" x="286" y="204" width="180" height="94" fill="#eef6ff" stroke="#0969da"/>
  <text x="326" y="236" class="label">接收 message</text>
  <text x="316" y="260" class="small">validate envelope</text>
  <text x="316" y="278" class="small">create / resume task</text>

  <!-- context -->
  <rect class="box" x="542" y="204" width="224" height="94" fill="#fff8c5" stroke="#9a6700"/>
  <text x="594" y="236" class="label">构建 context</text>
  <text x="574" y="260" class="small">state + memory + policy</text>
  <text x="574" y="278" class="small">budget + recent events</text>

  <!-- proposal -->
  <rect class="box" x="408" y="346" width="260" height="96" fill="#faf0ff" stroke="#8250df"/>
  <text x="468" y="378" class="label">rules / LLM</text>
  <text x="444" y="402" class="small">产生下一步 proposal</text>
  <text x="444" y="420" class="small">reply / run / llm / actor message / wait</text>

  <!-- policy -->
  <rect class="box" x="870" y="210" width="170" height="94" fill="#ffebe9" stroke="#cf222e"/>
  <text x="918" y="242" class="label">policy gate</text>
  <text x="908" y="266" class="small">validate proposal</text>
  <text x="908" y="284" class="small">allow / reject / ask</text>

  <!-- actions -->
  <rect class="box" x="870" y="358" width="170" height="126" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="920" y="390" class="label">执行动作</text>
  <text x="908" y="416" class="mono">reply</text>
  <text x="908" y="436" class="mono">start soma_run</text>
  <text x="908" y="456" class="mono">call LLM again</text>
  <text x="908" y="476" class="mono">send actor message</text>

  <!-- result/event -->
  <rect class="box" x="366" y="510" width="338" height="72" fill="#f6f8fa" stroke="#57606a"/>
  <text x="426" y="540" class="label">message / event / result</text>
  <text x="414" y="562" class="small">task_id / correlation_id 串起每一轮</text>

  <!-- final result -->
  <rect class="box" x="870" y="36" width="170" height="88" fill="#f6f8fa" stroke="#57606a"/>
  <text x="926" y="68" class="label">最终结果</text>
  <text x="908" y="92" class="mono">ask/reply</text>
  <text x="982" y="92" class="mono">events</text>
  <text x="908" y="112" class="mono">poll result</text>

  <!-- arrows main -->
  <path class="edge" d="M196,267 H286"/>
  <path class="edge" d="M466,251 H542"/>
  <path class="edge" d="M654,298 V346"/>
  <path class="edge-purple" d="M668,394 C744,394 792,258 870,258"/>
  <path class="edge" d="M955,304 V358"/>
  <path class="edge-dash" d="M870,421 C800,492 718,538 704,546"/>
  <path class="edge-dash" d="M366,546 C292,512 270,364 286,298"/>
  <path class="edge" d="M955,210 V124"/>

  <!-- actor internal loop arrow -->
  <path class="edge-purple" d="M538,442 C536,472 536,490 536,510"/>

  <!-- labels -->
  <text x="218" y="255" class="small">message</text>
  <text x="484" y="240" class="small">task</text>
  <text x="670" y="330" class="small">decision frame</text>
  <text x="744" y="350" class="small">proposal</text>
  <text x="962" y="336" class="small">allowed action</text>
  <text x="740" y="526" class="small">operation result</text>
  <text x="278" y="502" class="small">next loop</text>
  <text x="968" y="170" class="small">terminal</text>

  <!-- key note -->
  <rect x="36" y="500" width="250" height="82" rx="10" fill="#fff8c5" stroke="#9a6700"/>
  <text x="58" y="528" class="label">关键点</text>
  <text x="58" y="552" class="small">LLM/rules 只产生 proposal</text>
  <text x="58" y="572" class="small">状态转移和执行权属于 soma_actor</text>
</svg>
