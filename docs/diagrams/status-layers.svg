<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 416" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="2" y="2" width="876" height="412" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <!-- header -->
  <text x="24" y="34" font-size="14" font-weight="700" fill="#1f2328">Soma — built and green on main</text>
  <text x="24" y="53" font-size="11" fill="#57606a" font-family="system-ui, -apple-system, Segoe UI, sans-serif">EUnit 227 &#183; Common Test 313 &#183; Erlang/OTP 29 — every layer proven for process survival, not just return values</text>

  <!-- column labels -->
  <text x="24" y="74" font-size="11" font-weight="600" fill="#1a7f37" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Runtime layers — all built &#10003;</text>
  <text x="556" y="74" font-size="11" font-weight="600" fill="#57606a" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Parallel tracks</text>

  <!-- left: layer stack, newest on top, foundation at bottom -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <!-- v0.7.1 -->
    <rect x="24" y="82" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="102" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.7.1 &#183; Resume journal</text>
    <text x="40" y="118" font-size="11" fill="#4b5d52">run.started journal + read-only reconstruct from the trail</text>
    <text x="516" y="110" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>

    <!-- v0.6 -->
    <rect x="24" y="134" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="154" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.6 &#183; Durability + observability</text>
    <text x="40" y="170" font-size="11" fill="#4b5d52">soma_trace timelines + disk_log store, survives restart</text>
    <text x="516" y="162" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>

    <!-- v0.5 -->
    <rect x="24" y="186" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="206" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.5 &#183; Decision layer</text>
    <text x="40" y="222" font-size="11" fill="#4b5d52">LLM-call worker &#183; proposals &#183; policy gate &#183; budgets</text>
    <text x="516" y="214" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>

    <!-- v0.4 -->
    <rect x="24" y="238" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="258" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.4 &#183; Agent entity</text>
    <text x="40" y="274" font-size="11" fill="#4b5d52">soma_actor (gen_statem): messages &#8594; tasks &#8594; runs</text>
    <text x="516" y="266" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>

    <!-- v0.3 -->
    <rect x="24" y="290" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="310" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.3 &#183; LFE DSL</text>
    <text x="40" y="326" font-size="11" fill="#4b5d52">compile-only Lisp &#8594; step lists</text>
    <text x="516" y="318" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>

    <!-- v0.1-0.2 -->
    <rect x="24" y="342" width="512" height="46" rx="7" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="40" y="362" font-size="12.5" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.1&#8211;0.2 &#183; Runtime core</text>
    <text x="40" y="378" font-size="11" fill="#4b5d52">supervised runs &#183; timeout / cancel / crash &#183; BEAM + CLI tools</text>
    <text x="516" y="370" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">&#10003;</text>
  </g>

  <!-- right: parallel tracks + not-yet-built -->
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <!-- real provider -->
    <rect x="556" y="82" width="300" height="46" rx="7" fill="#ddf4ff" stroke="#0969da"/>
    <text x="570" y="102" font-size="12" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Real LLM provider</text>
    <text x="570" y="119" font-size="10.5" fill="#57606a">OpenAI-compatible &#183; opt-in, off the gate</text>

    <!-- cli wire -->
    <rect x="556" y="134" width="300" height="46" rx="7" fill="#ddf4ff" stroke="#0969da"/>
    <text x="570" y="154" font-size="12" font-weight="700" fill="#1f2328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">CLI / Lisp wire</text>
    <text x="570" y="171" font-size="10.5" fill="#57606a">soma_cli &#183; run / ask / status / trace / cancel</text>

    <text x="556" y="207" font-size="11" font-weight="600" fill="#8c959f">Next — not built yet</text>

    <!-- resume executor -->
    <rect x="556" y="216" width="300" height="44" rx="7" fill="#f6f8fa" stroke="#8c959f" stroke-dasharray="5 3"/>
    <text x="570" y="235" font-size="12" font-weight="700" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Resume executor</text>
    <text x="570" y="251" font-size="10.5" fill="#8c959f">replay a run from its reconstructed snapshot</text>

    <!-- linux release -->
    <rect x="556" y="266" width="300" height="44" rx="7" fill="#f6f8fa" stroke="#8c959f" stroke-dasharray="5 3"/>
    <text x="570" y="285" font-size="12" font-weight="700" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Linux release</text>
    <text x="570" y="301" font-size="10.5" fill="#8c959f">x86_64 / arm64 packaging &#183; macOS arm64 done</text>
  </g>

  <!-- footer -->
  <text x="24" y="405" font-size="10.5" fill="#57606a" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Each layer ships its own proof set under rebar3 eunit &amp;&amp; rebar3 ct. Full layer-by-layer status: docs/roadmap.md.</text>
</svg>
